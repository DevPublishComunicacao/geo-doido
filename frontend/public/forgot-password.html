<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Where? - Recuperar Senha</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">
  <div id="app">
    <div id="hero-streetview"></div>
    <div id="hero-overlay"></div>
    <div class="auth-container">
      <a href="/" class="auth-logo"><img src="images/logo.png" alt="Where?" class="logo-img-auth"></a>
      <h2 style="text-align:center;margin-bottom:1rem;">Recuperar Senha</h2>

      <form id="form-forgot" class="auth-form">
        <div class="auth-error hidden" id="forgot-erro"></div>
        <div class="auth-success hidden" id="forgot-sucesso"></div>

        <p style="color:#aaa;margin-bottom:1rem;text-align:center;font-size:0.9rem;">
          Digite seu email e enviaremos um link para redefinir sua senha.
        </p>

        <label class="auth-label">Email</label>
        <input type="email" id="forgot-email" class="auth-input" placeholder="seu@email.com" required>

        <button type="submit" class="btn-primary auth-submit">Enviar link</button>
        <a href="/login.html" class="auth-link" style="display:block;text-align:center;">Voltar ao login</a>
      </form>

      <form id="form-reset" class="auth-form hidden">
        <div class="auth-error hidden" id="reset-erro"></div>
        <div class="auth-success hidden" id="reset-sucesso"></div>

        <label class="auth-label">Nova Senha (mín. 6 caracteres)</label>
        <div class="password-wrapper">
          <input type="password" id="reset-senha" class="auth-input" placeholder="Nova senha" required minlength="6">
          <button type="button" class="toggle-senha" onclick="toggleSenha('reset-senha', this)" tabindex="-1" aria-label="Mostrar senha">
            <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>

        <button type="submit" class="btn-primary auth-submit">Redefinir Senha</button>
      </form>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="js/hero-bg.js"></script>
  <script>
    function toggleSenha(id, btn) {
      var input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
        btn.querySelector('.eye-open').classList.add('hidden');
        btn.querySelector('.eye-closed').classList.remove('hidden');
      } else {
        input.type = 'password';
        btn.querySelector('.eye-closed').classList.add('hidden');
        btn.querySelector('.eye-open').classList.remove('hidden');
      }
    }

    const API = '';
    function $(id) { return document.getElementById(id); }

    const params = new URLSearchParams(window.location.search);
    const resetToken = params.get('token');

    if (resetToken) {
      $('form-forgot').classList.add('hidden');
      $('form-reset').classList.remove('hidden');

      $('form-reset').addEventListener('submit', async (e) => {
        e.preventDefault();
        const erroEl = $('reset-erro');
        const sucessoEl = $('reset-sucesso');
        erroEl.classList.add('hidden');
        sucessoEl.classList.add('hidden');

        const res = await fetch(API + '/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: resetToken, senha: $('reset-senha').value }),
        });

        const data = await res.json();
        if (!res.ok) {
          erroEl.textContent = data.erro;
          erroEl.classList.remove('hidden');
          return;
        }

        sucessoEl.textContent = 'Senha redefinida! Redirecionando para o login...';
        sucessoEl.classList.remove('hidden');
        setTimeout(() => window.location.href = '/login.html', 2000);
      });
    } else {
      $('form-forgot').addEventListener('submit', async (e) => {
        e.preventDefault();
        const erroEl = $('forgot-erro');
        const sucessoEl = $('forgot-sucesso');
        erroEl.classList.add('hidden');
        sucessoEl.classList.add('hidden');

        const res = await fetch(API + '/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: $('forgot-email').value }),
        });

        const data = await res.json();
        if (!res.ok) {
          erroEl.textContent = data.erro;
          erroEl.classList.remove('hidden');
          return;
        }

        sucessoEl.textContent = data.mensagem;
        sucessoEl.classList.remove('hidden');
        $('forgot-email').value = '';
      });
    }
  </script>
</body>
</html>
